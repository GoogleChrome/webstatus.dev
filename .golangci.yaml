version: '2'
linters:
  default: none
  enable:
    - containedctx
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - gochecknoglobals
    - gocognit
    - goconst
    - gocyclo
    - godot
    - goheader
    - gomoddirectives
    - gosec
    - govet
    - importas
    - ineffassign
    - ireturn
    - lll
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
    - usestdlibvars
  settings:
    goconst:
      ignore-tests: true
    gomoddirectives:
      replace-local: true
    dupl:
      # The default is 150
      threshold: 175
    exhaustive:
      check:
        - switch
        - map
    depguard:
      rules:
        differ_restrictions:
          files:
            - '**/workers/event_producer/pkg/differ/**.go'
          deny:
            - pkg: 'github.com/GoogleChrome/webstatus.dev/lib/gcpspanner/spanneradapters'
              desc: 'The differ must be decoupled from specific backend adapters.'
        worker_restrictions:
          files:
            - '**/workers/*/pkg/**.go'
          deny:
            - pkg: 'github.com/GoogleChrome/webstatus.dev/lib/gcpspanner/spanneradapters'
              desc: 'Worker core logic must be decoupled from specific backend adapters.'
        workertypes_restrictions:
          files:
            - '**/lib/workertypes/**.go'
          deny:
            - pkg: 'github.com/GoogleChrome/webstatus.dev/lib/gcpspanner/spanneradapters'
              desc: 'workertypes must not depend on database adapters.'

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - lib/gen
      - third_party$
      - builtin$
      - examples$
    rules:
      # Exclude goconst for lib/gcpspanner because this package consists of over 100 files whose sole responsibility
      # is executing Spanner SQL queries and DML with parameter maps (e.g., map[string]any{"startAt": startAt}).
      # In Spanner SQL, placeholders must match @paramName inside raw multiline SQL query strings. Because raw SQL strings
      # cannot interpolate Go constants cleanly without degrading readability, extracting parameter keys into constants
      # (e.g. paramStartAt = "startAt") decouples the map key from the @startAt placeholder right next to it.
      # Excluding goconst from lib/gcpspanner avoids brittle string whitelists and false positives on query parameter maps
      # while keeping goconst strictly active across all application and worker packages.
      # NOTE: Revisit this goconst path exclusion once point-lookup and exact key-set refactoring from spanner.Statement
      # to native Key-Set reads (Columns() []string and spanner.Key) is completed (see GitHub issue #2605:
      # https://github.com/GoogleChrome/webstatus.dev/issues/2605).
      - path: lib/gcpspanner/.*\.go
        linters:
          - goconst
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - lib/gen
      - third_party$
      - builtin$
      - examples$
