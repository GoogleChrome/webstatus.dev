apiVersion: v1
kind: Pod
metadata:
  name: webhook
  labels:
    app.kubernetes.io/name: webhook
spec:
  containers:
    - name: webhook
      image: webhook
      imagePullPolicy: Never # Need this for pushing directly into minikube
      env:
        - name: PROJECT_ID
          value: local
        - name: SPANNER_DATABASE
          value: 'local'
        - name: SPANNER_INSTANCE
          value: 'local'
        - name: SPANNER_EMULATOR_HOST
          value: 'spanner:9010'
        - name: PUBSUB_EMULATOR_HOST
          value: 'pubsub:8060'
        - name: WEBHOOK_SUBSCRIPTION_ID
          value: 'webhook-delivery-sub-id'
        - name: FRONTEND_BASE_URL
          value: 'http://localhost:8080'
      resources:
        limits:
          cpu: 250m
          memory: 256Mi
  restartPolicy: Never
