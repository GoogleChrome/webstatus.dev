receivers:
  # Open two OTLP servers:
  # - On port 4317, open an OTLP GRPC server
  # - On port 4318, open an OTLP HTTP server
  otlp:
    protocols:
      grpc:
        endpoint: localhost:4317
      http:
        cors:
          # This effectively allows any origin to make requests to the HTTP server.
          allowed_origins:
            - http://*
            - https://*
        endpoint: localhost:4318

processors:
  # Regulate both the number of requests being made and the size of those requests.
  batch:
    send_batch_max_size: 500 # Kept our tuned high-throughput size
    send_batch_size: 500
    timeout: 1s # Kept our low-latency timeout

  # Check the memory usage of the collector process to prevent Cloud Run OOM.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 65
    spike_limit_percentage: 20

  # Detect GCP resource metadata.
  resourcedetection:
    detectors: [gcp]
    timeout: 10s

  # Inject Cloud Run revision version and region into telemetry.
  resource:
    attributes:
      - key: service.version
        value: ${env:K_REVISION:-latest}
        action: upsert
      - key: cloud.region
        value: ${env:OTEL_COLLECTOR_REGION:-unknown}
        action: upsert

  # Rename Prometheus metrics labels to prevent collisions with GCP system labels.
  transform/collision:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["exported_location"], attributes["location"])
          - delete_key(attributes, "location")
          - set(attributes["exported_cluster"], attributes["cluster"])
          - delete_key(attributes, "cluster")
          - set(attributes["exported_namespace"], attributes["namespace"])
          - delete_key(attributes, "namespace")
          - set(attributes["exported_job"], attributes["job"])
          - delete_key(attributes, "job")
          - set(attributes["exported_instance"], attributes["instance"])
          - delete_key(attributes, "instance")
          - set(attributes["exported_project_id"], attributes["project_id"])
          - delete_key(attributes, "project_id")

  # Standardize project ID resource attribute.
  transform/set_project_id:
    error_mode: ignore
    trace_statements:
      - set(resource.attributes["gcp.project_id"], resource.attributes["gcp.project.id"]) where resource.attributes["gcp.project.id"] != nil
      - set(resource.attributes["gcp.project_id"], resource.attributes["cloud.account.id"]) where resource.attributes["gcp.project_id"] == nil and resource.attributes["cloud.account.id"] != nil

exporters:
  # Export logs to Cloud Logging
  googlecloud:
    log:
      default_log_name: opentelemetry-collector

  # Export metrics to Google Managed Service for Prometheus.
  googlemanagedprometheus:

  # Export traces directly to Google Cloud Trace OTLP endpoint (high-performance).
  otlp:
    endpoint: telemetry.googleapis.com:443
    compression: none
    balancer_name: pick_first
    auth:
      authenticator: googleclientauth

extensions:
  # Opens health check endpoint on port 4319 (matching our Cloud Run probes).
  health_check:
    endpoint: 0.0.0.0:4319
  googleclientauth:

service:
  extensions:
    - health_check
    - googleclientauth
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [googlecloud]
    metrics/otlp:
      receivers: [otlp]
      processors:
        [
          resourcedetection,
          transform/collision,
          memory_limiter,
          resource,
          batch,
        ]
      exporters: [googlemanagedprometheus]
    traces:
      receivers: [otlp]
      processors:
        [
          resourcedetection,
          memory_limiter,
          transform/set_project_id,
          resource,
          batch,
        ]
      exporters: [otlp]
